name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.0.0)
        required: true
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/tree-sitter-glsl-spec
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Set version
        run: sed -i "/^\[package\]/,/^\[/{s/^version = \".*\"/version = \"${{inputs.version}}\"/}" Cargo.toml
      - run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{secrets.CRATES_TOKEN}}
