name: Publish package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  ci-check:
    name: Verify CI passed
    runs-on: ubuntu-latest
    outputs:
      passed: ${{steps.check.outputs.passed}}
    steps:
      - name: Check CI status for this commit
        id: check
        env:
          GH_TOKEN: ${{github.token}}
        run: |
          SHA="${{github.sha}}"
          RESULT=$(gh api "repos/${{github.repository}}/commits/$SHA/check-runs" \
            --jq '[.check_runs[] | select(.name == "Test bindings" and .conclusion == "success")] | length')
          if [ "$RESULT" -eq 0 ]; then
            echo "::warning::No successful CI run found for $SHA — skipping publish. CI will re-trigger this workflow when it passes."
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

  set-version:
    name: Set version from tag
    needs: ci-check
    if: needs.ci-check.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.version.outputs.version}}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: tree-sitter.json
          sparse-checkout-cone-mode: false
      - id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a valid semver version"
            exit 1
          fi
          TS_VERSION=$(python3 -c "import json; print(json.load(open('tree-sitter.json'))['metadata']['version'])")
          if [[ "$VERSION" != "$TS_VERSION" ]]; then
            echo "::error::Tag version ($VERSION) does not match tree-sitter.json ($TS_VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  npm:
    needs: set-version
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{needs.set-version.outputs.version}}
    secrets: inherit

  crates:
    needs: set-version
    uses: ./.github/workflows/publish-crates.yml
    with:
      version: ${{needs.set-version.outputs.version}}
    secrets: inherit

  pypi:
    needs: set-version
    uses: ./.github/workflows/publish-pypi.yml
    with:
      version: ${{needs.set-version.outputs.version}}
    secrets: inherit

  release:
    name: Create GitHub release
    needs: [npm, crates, pypi]
    if: always() && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Create release
        env:
          GH_TOKEN: ${{github.token}}
        run: |
          TAG="${{github.ref_name}}"
          TAG_MSG=$(git tag -l --format='%(contents:subject)' "$TAG")
          TITLE="${TAG}${TAG_MSG:+ — $TAG_MSG}"
          NOTES=$(bash .github/scripts/release_notes.sh "$TAG")
          gh release create "$TAG" \
            --repo "${{github.repository}}" \
            --title "$TITLE" \
            --notes "$NOTES"
